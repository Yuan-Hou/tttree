# 首装种子(无注册系统)。复制为 auth_users.toml(已 gitignore)后改成真实口令。
#
# 用法变更:此文件现在只是「首次启动的种子」。后端启动时若 DB 的 users 表为空,会把这里的用户
# 哈希后写入 DB,此后**以 DB 为真相源、不再读本文件**。新增/改名/改密/封禁用户都走管理控制台
# (管理员登录后进入),不再改文件。想重新种子 = 清空 DB 的 users 表后重启。
#
# id       数据归属用户号 = Story.owner_id,也是 JWT 里的 uid。现有全部数据归 "1"。
# name     登录名(= 展示昵称,同一字段)。
# password 登录口令(明文;仅种子时读取,入库即哈希)。
# admin    可选,true = 管理员(能进管理控制台)。省略时,id="1" 或 name="admin" 也默认视为管理员。

[[users]]
id = "1"
name = "admin"
password = "change-me"
admin = true
